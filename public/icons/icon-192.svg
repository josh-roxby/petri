<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- Petri app icon: porthole motif. Dark background, white outer ring, dim inner ring, soft affinity-green cell at centre. -->
  <rect width="192" height="192" rx="36" fill="#060606"/>
  <!-- faint grid hint -->
  <g stroke="rgba(255,255,255,0.04)" stroke-width="1">
    <line x1="48" y1="0" x2="48" y2="192"/>
    <line x1="96" y1="0" x2="96" y2="192"/>
    <line x1="144" y1="0" x2="144" y2="192"/>
    <line x1="0" y1="48" x2="192" y2="48"/>
    <line x1="0" y1="96" x2="192" y2="96"/>
    <line x1="0" y1="144" x2="192" y2="144"/>
  </g>
  <!-- outer porthole ring -->
  <circle cx="96" cy="96" r="72" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="3"/>
  <!-- inner porthole ring -->
  <circle cx="96" cy="96" r="66" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <!-- porthole dish -->
  <circle cx="96" cy="96" r="62" fill="#0a0a0a"/>
  <!-- cell glow -->
  <circle cx="96" cy="96" r="34" fill="rgba(31,204,121,0.25)"/>
  <circle cx="96" cy="96" r="22" fill="rgba(31,204,121,0.55)"/>
  <circle cx="96" cy="96" r="10" fill="rgba(255,255,255,0.95)"/>
  <!-- cardinal bolts -->
  <circle cx="96" cy="22" r="3.5" fill="rgba(255,255,255,0.25)"/>
  <circle cx="170" cy="96" r="3.5" fill="rgba(255,255,255,0.25)"/>
  <circle cx="96" cy="170" r="3.5" fill="rgba(255,255,255,0.25)"/>
  <circle cx="22" cy="96" r="3.5" fill="rgba(255,255,255,0.25)"/>
</svg>
