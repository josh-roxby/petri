<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Maskable variant: respects the 20% safe-zone rule. Core glyph is constrained
       to a 307×307 centred square (60% of 512) so Android's adaptive shape mask
       never clips the logo. Full bleed background extends to the edges. -->
  <rect width="512" height="512" fill="#060606"/>
  <!-- central 307-wide safe-zone motif (no rings hit outside r=153) -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="6"/>
  <circle cx="256" cy="256" r="126" fill="#0a0a0a"/>
  <circle cx="256" cy="256" r="70"  fill="rgba(31,204,121,0.25)"/>
  <circle cx="256" cy="256" r="46"  fill="rgba(31,204,121,0.55)"/>
  <circle cx="256" cy="256" r="22"  fill="rgba(255,255,255,0.95)"/>
</svg>
